name: Test Store Extraction

on:
  workflow_dispatch:
  push:
    branches:
      - claude/store-info-extraction-rj3b5e

permissions:
  contents: write

jobs:
  test-extract:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Test single-store extraction
      run: |
        python3 extract_store.py \
          'https://www.coles.com.au/find-stores/coles/act/amaroo-5784'

    - name: Test enrich on first 5 stores
      run: |
        python3 enrich_stores.py --limit 5 --delay 1

    - name: Show enriched output
      run: |
        python3 - <<'EOF'
        import json
        stores = json.load(open('stores.json'))
        enriched = [s for s in stores if 'lat' in s]
        print(f"{len(enriched)} stores enriched")
        for s in enriched[:5]:
            print(json.dumps(s, indent=2))
        EOF

    - name: Commit enriched stores
      run: |
        git config user.name "Automated"
        git config user.email "actions@users.noreply.github.com"
        git add stores.json
        git commit -m "Test: enrich first 5 stores with address/coords/hours" || exit 0
        git pull --rebase
        git push
